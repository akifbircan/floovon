# Nginx Configuration Example for /uploads/ Proxy
# Bu dosyayı nginx config dosyanıza ekleyin veya referans olarak kullanın
#
# Konum: /etc/nginx/sites-available/panel.floovon.com
# veya: /etc/nginx/conf.d/panel.floovon.com.conf

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name panel.floovon.com;
    
    # SSL sertifikaları (Let's Encrypt örneği)
    # ssl_certificate /etc/letsencrypt/live/panel.floovon.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/panel.floovon.com/privkey.pem;
    
    # Root directory (frontend)
    root /home/floovon/htdocs/panel.floovon.com;
    index index.html;
    
    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ============================================
    # UPLOADS PROXY CONFIGURATION
    # ============================================
    # Tenant-based uploads için proxy (önerilen yöntem)
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache ayarları (opsiyonel - görseller için)
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # CORS headers (gerekirse)
        # add_header Access-Control-Allow-Origin *;
    }
    
    # Alternatif: Direct file serving (backend uploads path biliniyorsa)
    # NOT: Bu yöntem backend'in çalışmasına gerek kalmaz ama path'i doğru bilmek gerekir
    # location /uploads/ {
    #     alias /home/floovon/htdocs/panel.floovon.com/backend/uploads/;
    #     try_files $uri $uri/ =404;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }
    
    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ============================================
# KURULUM TALİMATLARI
# ============================================
# 1. Bu config'i nginx config dosyanıza ekleyin
# 2. Config'i test edin: sudo nginx -t
# 3. Nginx'i reload edin: sudo systemctl reload nginx
# 4. Test edin:
#    curl -I http://127.0.0.1:3001/uploads/
#    curl -I https://panel.floovon.com/uploads/
#    curl -I https://panel.floovon.com/uploads/tenants/1/profiles/akifbircan/profil-akifbircan.jpg










