<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifremi Unuttum - Floovon</title>
      <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <link rel="manifest" href="../favicon/site.webmanifest">
    <link rel="stylesheet" href="../css/landing-styles.css">
  <link rel="stylesheet" href="../css/landing-login.css">
  </head>
<body>
  <div class="login-page">
    <div class="login-bg-gradient"></div>
    <div class="login-bg-blob-left"></div>
    <div class="login-bg-blob-right"></div>

    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <a href="landing.html" class="login-logo">
            <img src="../assets/landing/logo-floovon-dark.svg" alt="Floovon" width="160" height="40">
          </a>
          <h1 class="login-title">Şifremi Unuttum</h1>
          <p class="login-subtitle">Şifrenizi sıfırlamak için bilgilerinizi girin</p>
        </div>

        <div id="forgot-error" class="login-error" style="display: none;"></div>
        <div id="forgot-success" class="login-success" style="display: none;"></div>

        <form id="forgot-password-form" class="login-form">
          <div class="landing-form-group">
            <label for="tenantCode" class="landing-form-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>
              Tenant Kodu
            </label>
            <input type="text" id="tenantCode" name="tenantCode" placeholder="Tenant kodunuzu yazın" class="landing-form-input" required>
            <span class="form-hint">Satın alma sonrası size verilen işletme kodu</span>
          </div>

          <div class="landing-form-group">
            <label for="usernameOrEmail" class="landing-form-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Kullanıcı Adı veya E-posta
            </label>
            <input type="text" id="usernameOrEmail" name="usernameOrEmail" placeholder="Kullanıcı adınız veya e-posta adresiniz" class="landing-form-input" required>
            <span class="form-hint">Kayıtlı kullanıcı adınız veya e-posta adresiniz</span>
          </div>

          <button type="submit" class="login-button" id="submit-btn">
            <span>Şifre Sıfırlama Linki Gönder</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </form>

        <div class="login-footer">
          <p>Şifrenizi hatırladınız mı?</p>
          <a href="login.html" class="signup-link">Giriş Yap</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('forgot-password-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const tenantCode = document.getElementById('tenantCode').value.trim();
      const usernameOrEmail = document.getElementById('usernameOrEmail').value.trim();
      const errorDiv = document.getElementById('forgot-error');
      const successDiv = document.getElementById('forgot-success');
      const submitBtn = document.getElementById('submit-btn');

      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      if (!tenantCode || !usernameOrEmail) {
        errorDiv.textContent = 'Lütfen tüm alanları doldurun.';
        errorDiv.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span>Gönderiliyor...</span>';

      try {
        // API Base URL - localhost/production algılama
        let apiBase;
        const hostname = window.location.hostname || '';
        const port = window.location.port || '';
        const isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '' || port === '5501' || port === '5500';
        
        if (isLocalhost) {
          // Development: localhost kullan
          const backendPort = localStorage.getItem('backend_port') || '3001';
          apiBase = `http://localhost:${backendPort}/api`;
        } else if (window.getFloovonApiBase && typeof window.getFloovonApiBase === 'function') {
          // Production: getFloovonApiBase kullan
          apiBase = window.getFloovonApiBase();
        } else if (window.API_BASE_URL && !window.API_BASE_URL.includes('localhost') && !window.API_BASE_URL.includes('127.0.0.1')) {
          // Production: window.API_BASE_URL kullan (localhost değilse)
          apiBase = window.API_BASE_URL;
        } else {
          // Fallback: relative path (production)
          apiBase = '/api';
        }
        
        const url = `${apiBase}/auth/forgot-password`;
        
        let response;
        try {
          response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              emailOrPhone: usernameOrEmail,
              tenant_code: tenantCode
            })
          });
        } catch (fetchError) {
          // Network hatası
          errorDiv.textContent = 'Bağlantı hatası. Lütfen tekrar deneyin.';
          errorDiv.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>Şifre Sıfırlama Linki Gönder</span><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>';
          return;
        }

        let result;
        try {
          result = await response.json();
        } catch (jsonError) {
          // JSON parse hatası
          const errorMessage = response.status === 404 
            ? 'Kullanıcı bilgisi bulunamadı, kullanıcı adınızı veya e-posta adresinizi kontrol edin'
            : 'Bir hata oluştu. Lütfen tekrar deneyin.';
          errorDiv.textContent = errorMessage;
          errorDiv.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>Şifre Sıfırlama Linki Gönder</span><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>';
          return;
        }

        if (response.ok && result.success) {
          // Backend'den gelen error mesajını kontrol et
          if (result.error) {
            // Backend'den hata mesajı geldi, göster
            errorDiv.textContent = result.error;
            errorDiv.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span>Şifre Sıfırlama Linki Gönder</span><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>';
            return;
          }
          
          // Başarılı - şifre sıfırlama linki gönderildi
          successDiv.innerHTML = '<strong>Başarılı!</strong> Şifre sıfırlama linki e-posta adresinize gönderildi. Lütfen gelen kutunuzu kontrol edin.';
          successDiv.style.display = 'block';
          
          // 2 saniye sonra giriş sayfasına yönlendir
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          const errorMessage = result.error || result.message || 'Kullanıcı bilgisi bulunamadı, kullanıcı adınızı veya e-posta adresinizi kontrol edin';
          errorDiv.textContent = errorMessage;
          errorDiv.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>Şifre Sıfırlama Linki Gönder</span><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>';
        }
      } catch (error) {
        console.error('Şifre sıfırlama hatası:', error);
        errorDiv.textContent = 'Bir hata oluştu. Lütfen tekrar deneyin.';
        errorDiv.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Şifre Sıfırlama Linki Gönder</span><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>';
      }
    });
  </script>
</body>
</html>
