<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap - Floovon</title>
      <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <link rel="manifest" href="../favicon/site.webmanifest">
    <link rel="stylesheet" href="../css/landing-styles.css">
  <link rel="stylesheet" href="../css/landing-login.css">
  <link rel="stylesheet" href="../css/toast-notification-style.css">
  </head>
<body>
  <div class="login-page">
    <div class="login-bg-gradient"></div>
    <div class="login-bg-blob-left"></div>
    <div class="login-bg-blob-right"></div>

    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <a href="landing.html" class="login-logo">
            <img src="../assets/landing/logo-floovon-dark.svg" alt="Floovon" width="160" height="40">
          </a>
          <h1 class="login-title">Hoş Geldiniz</h1>
          <p class="login-subtitle">Hesabınıza giriş yapın</p>
        </div>

        <div id="login-error" class="login-error rounded-md p-4" style="display: none;" role="alert">
          <div class="login-error-text text-sm"></div>
        </div>

        <form id="login-form" class="login-form">
          <div class="form-group">
            <label for="tenantCode" class="form-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>
              Tenant Kodu
            </label>
            <input type="text" id="tenantCode" name="tenantCode" placeholder="Tenant kodunuzu yazın" class="form-input" required>
            <span class="form-hint">Satın alma sonrası size verilen işletme kodu</span>
          </div>

          <div class="form-group">
            <label for="username" class="form-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Kullanıcı Adı veya E-posta
            </label>
            <input type="text" id="username" name="username" placeholder="Kullanıcı adı veya e-posta" class="form-input" required>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Şifre
            </label>
            <div class="password-input-wrapper">
              <input type="password" id="password" name="password" placeholder="••••••••" class="form-input" required>
              <button type="button" id="toggle-password" class="password-toggle">
                <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-off-icon" style="display:none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
              </button>
            </div>
          </div>

          <div class="form-actions">
            <a href="forgot-password.html" class="forgot-password-link">Şifremi Unuttum</a>
          </div>

          <button type="submit" class="login-button" id="submit-btn">
            <span>Giriş Yap</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </form>

        <div class="login-footer">
          <p>Henüz hesabınız yok mu?</p>
          <a href="landing.html#pricing" class="signup-link">Hemen Başla</a>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/toast-notification-script.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
